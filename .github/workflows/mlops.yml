name: MLOps Pipeline CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Training Data Exists
        run: |
          ls data
          ls data/raw

      - name: Run Feature Pipeline
        run: |
          python features/build_features.py

      - name: Train Model
        run: |
          python training/train.py

      - name: Verify Champion Model
        run: |
          test -f training/champion/champion_model.pkl

      - name: Verify Metrics File
        run: |
          test -f training/champion/champion_metrics.json